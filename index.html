<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Widget de Afirmaciones</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      background-color: transparent;
      color: #37352f;
      text-align: center;
      padding: 20px;
    }
    .quote-container { max-width: 80%; }
    .quote { font-size: 1.5rem; font-weight: 500; font-style: italic; line-height: 1.4; }
  </style>
</head>
<body>

  <div class="quote-container">
    <div class="quote" id="quote-text">Conectando con tu base de datos...</div>
  </div>

<script>
    // Enlace de exportación directa a CSV
    const csvUrl = "https://docs.google.com/spreadsheets/d/1-HhZUATH2WuJnArqdqe69ZalfeysoEGwRePJ89-GSUo/export?format=csv";

    fetch(csvUrl)
      .then(respuesta => respuesta.text())
      .then(datosCsv => {
        // Convertimos el texto del CSV en una lista de frases
        const frases = datosCsv.split('\n').map(fila => fila.trim()).filter(fila => fila.length > 0);
        
        function actualizarFrase() {
          const tiempoActual = Math.floor(Date.now() / 1000);
          const ventanaDosHoras = 2 * 60 * 60; 
          const indice = Math.floor(tiempoActual / ventanaDosHoras) % frases.length;
          
          document.getElementById('quote-text').innerText = `"${frases[indice]}"`;
        }

        actualizarFrase();
        setInterval(actualizarFrase, 60000);
      })
      .catch(error => {
        console.error("Error al obtener el CSV:", error);
        document.getElementById('quote-text').innerText = "Hubo un error al cargar las frases.";
      });
  </script>

</body>
</html>
